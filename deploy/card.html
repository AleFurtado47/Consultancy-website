<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ale Furtado — contact</title>
<meta name="description" content="Ale Furtado — strategic co-creation for international organizations. Save my contact." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
  :root{
    --paper:#F7F6F2; --ink:#17181B; --grey:#54534D; --grey-soft:#8C8B84;
    --line:#E4E3DC; --blue:#2747E0;
    --serif:'Playfair Display',Georgia,serif; --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:26px 18px}
  a{text-decoration:none;color:inherit}
  .card{width:100%;max-width:396px;background:var(--paper);border:0.5px solid var(--line);border-radius:22px;padding:32px 26px 26px;text-align:center}
  .photo{width:106px;height:106px;border-radius:50%;overflow:hidden;margin:0 auto 18px;border:0.5px solid var(--line);background:#ECEAE2}
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  h1{font-family:var(--serif);font-weight:400;font-size:34px;letter-spacing:-.01em;line-height:1}
  .role{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-top:12px;line-height:1.55}
  .qr-wrap{width:184px;height:184px;margin:26px auto 10px;background:#fff;border:0.5px solid var(--line);border-radius:14px;padding:12px}
  .qr-wrap img{width:100%;height:100%;display:block;image-rendering:pixelated}
  .scan{font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey-soft);margin-bottom:24px}
  .btns{display:flex;flex-direction:column;gap:10px}
  .btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 18px;border-radius:14px;border:0.5px solid var(--line);font-size:15px;color:var(--ink);transition:transform .12s,background .2s,border-color .2s;background:var(--paper)}
  .btn i{font-size:20px;color:var(--blue);width:22px;text-align:center;flex:none}
  .btn:active{transform:scale(.985)}
  .btn:hover{border-color:var(--ink)}
  .btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink);justify-content:center}
  .btn.primary i{color:var(--paper)}
  .btn.primary:hover{background:var(--blue);border-color:var(--blue)}
  .foot{display:flex;align-items:center;justify-content:center;gap:9px;margin-top:22px;font-size:12px;color:var(--grey-soft)}
</style>
</head>
<body>
  <div class="card">
    <div class="photo">
      <img src="assets/alessandra.png" alt="Ale Furtado">
    </div>
    <h1>Ale Furtado</h1>
    <p class="role">Strategic co-creation<br>for international organizations</p>

    <div class="qr-wrap"><img src="assets/qr-card.png" alt="QR code — scan to open Ale Furtado's card"></div>
    <p class="scan">Scan to open my card</p>

    <div class="btns">
      <a class="btn primary" href="assets/ale-furtado.vcf" download="Ale-Furtado.vcf"><i class="ti ti-user-plus" aria-hidden="true"></i>Save my contact</a>
      <a class="btn" href="tel:+33781733339"><i class="ti ti-phone" aria-hidden="true"></i>+33 7 81 73 33 39</a>
      <a class="btn" href="mailto:letstalk@alefurtado.org"><i class="ti ti-mail" aria-hidden="true"></i>letstalk@alefurtado.org</a>
      <a class="btn" href="https://www.linkedin.com/in/alessandra-gfurtado" target="_blank" rel="noopener"><i class="ti ti-brand-linkedin" aria-hidden="true"></i>LinkedIn</a>
      <a class="btn" href="https://wa.me/33781733339" target="_blank" rel="noopener"><i class="ti ti-brand-whatsapp" aria-hidden="true"></i>WhatsApp</a>
      <a class="btn" href="https://alefurtado.org" target="_blank" rel="noopener"><i class="ti ti-world" aria-hidden="true"></i>alefurtado.org</a>
    </div>

    <div class="foot">
      <svg width="26" height="26" viewBox="0 0 66 66" fill="none" aria-hidden="true"><text x="14" y="42" font-family="'Playfair Display',Georgia,serif" font-size="24" fill="#8C8B84">A</text><text x="37" y="42" font-family="'Playfair Display',Georgia,serif" font-size="24" fill="#8C8B84">F</text><path d="M25 60 A28 28 0 1 1 41 60" stroke="#2747E0" stroke-width="1.6"/><circle cx="25" cy="60" r="2.5" fill="#2747E0"/><circle cx="41" cy="60" r="2.5" fill="#2747E0"/></svg>
      <span>Strategy, made real.</span>
    </div>
  </div>
</body>
</html>
